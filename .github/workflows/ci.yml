name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  powershell:
    name: PowerShell checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            modulePath: ~/.local/share/powershell/Modules
          - os: windows-latest
            modulePath: C:\Users\runneradmin\Documents\PowerShell\Modules
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Cache PowerShell modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ matrix.modulePath }}
          key: psmodules-${{ runner.os }}-pssa-1.24.0-pester-5.7.1

      - name: Run CI checks
        shell: pwsh -NoProfile -NonInteractive -Command "{0}"
        run: |
          ./scripts/ci.ps1
